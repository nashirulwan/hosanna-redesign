<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hosanna Afghan Hounds — Hi-Fi</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hi-fi/styles.css" />
<link rel="stylesheet" href="hi-fi/responsive.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="hi-fi/data.js"></script>
<script type="text/babel" data-presets="react" src="hi-fi/components.jsx"></script>
<script type="text/babel" data-presets="react" src="hi-fi/page-home.jsx"></script>
<script type="text/babel" data-presets="react" src="hi-fi/page-dogs.jsx"></script>
<script type="text/babel" data-presets="react" src="hi-fi/page-profile.jsx"></script>
<script type="text/babel" data-presets="react" src="hi-fi/page-contact.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const App = () => {
  // route format: { page: 'home'|'dogs'|'profile'|'contact'|'litters'|'about', dog?: {...}, preselectDog?: 'id' }
  const [route, setRoute] = useState({ page: 'home' });

  // scroll to top when route changes
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [route.page, route.dog?.id]);

  const navigate = (page) => setRoute({ page });
  const openDog = (dog) => setRoute({ page: 'profile', dog });
  const inquireFor = (dogId) => setRoute({ page: 'contact', preselectDog: dogId });

  let pageEl;
  switch (route.page) {
    case 'dogs':    pageEl = <DogsPage onOpenDog={openDog} />; break;
    case 'profile': pageEl = <ProfilePage dog={route.dog} onNavigate={navigate} onOpenDog={openDog} />; break;
    case 'contact': pageEl = <ContactPage preselectDog={route.preselectDog} />; break;
    case 'litters': pageEl = <PlaceholderPage title="Litters & Archive" body="A record of Hosanna litters from 1998 to today." />; break;
    case 'about':   pageEl = <PlaceholderPage title="About the Kennel" body="The Farley family · the people behind Hosanna." />; break;
    default:        pageEl = <HomePage onNavigate={navigate} onOpenDog={openDog} />;
  }

  return (
    <>
      <Nav current={route.page} onNavigate={navigate} />
      <div key={route.page + (route.dog?.id || '')}>{pageEl}</div>
      <Footer onNavigate={navigate} />
      {/* sticky mobile CTA — only on non-contact pages */}
      {route.page !== 'contact' && (
        <div className="sticky-cta">
          <button className="btn btn-gold btn-lg" onClick={() => navigate('contact')}>
            Contact us <Icon name="arrow" />
          </button>
        </div>
      )}
    </>
  );
};

const PlaceholderPage = ({ title, body }) => (
  <main className="page-enter">
    <section className="section" style={{ minHeight: '60vh' }}>
      <div className="container">
        <div className="eyebrow">Coming soon</div>
        <h1 style={{ marginTop: 10 }}>{title}</h1>
        <p className="lede" style={{ marginTop: 16, maxWidth: 560 }}>{body}</p>
        <p className="muted" style={{ marginTop: 24, fontSize: 14 }}>
          This page is part of the redesign but not yet detailed — let me know if you'd like it next.
        </p>
      </div>
    </section>
  </main>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
